name: Tech News Digest
on:
  schedule:
    - cron: "0 3 * * *"   # 每天 11:00 北京时间
    - cron: "0 9 * * *"   # 每天 17:00 北京时间
  workflow_dispatch:

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch GitHub Trending
        run: |
          curl -s "https://api.github.com/search/repositories?q=created:>2025-01-01+language:python+stars:>100&sort=stars&order=desc&per_page=10" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "User-Agent: Mozilla/5.0" > github-trending.json

      - name: Fetch HN
        run: |
          curl -s "https://hn.algolia.com/api/v1/search_by_date?tags=front_page&hitsPerPage=30" \
            -H "User-Agent: Mozilla/5.0 (compatible)" > hn-raw.json

      - name: Build and Push to Feishu
        run: |
          pip install requests -q
          python3 << 'SCRIPT'
          import json, urllib.request

          gh = json.load(open("github-trending.json"))
          hn = json.load(open("hn-raw.json"))

          spam_kw = ["fake", "flash", "hotmail", "usdt", "btc", "eth/", "trump", "scam"]
          repos = []
          for item in gh.get("items", [])[:10]:
              name = item.get("full_name", "").lower()
              desc = item.get("description") or ""
              if not any(k in name for k in spam_kw) and not any(k in desc.lower() for k in spam_kw):
                  repos.append({
                      "name": item["full_name"],
                      "description": desc,
                      "stars": item.get("stargazers_count", 0),
                      "language": item.get("language") or "",
                      "url": item["html_url"]
                  })

          stories = []
          for hit in hn.get("hits", [])[:30]:
              title = hit.get("title", "")
              url = hit.get("url", "")
              if "Is Hiring" in title or not url: continue
              if hit.get("author","").startswith("_"): continue
              stories.append({
                  "title": title, "url": url,
                  "points": hit.get("points", 0),
                  "comments": hit.get("num_comments", 0),
                  "author": hit.get("author", "")
              })
          stories.sort(key=lambda x: x["points"], reverse=True)
          starred, top = stories[:5], stories[:10]

          from datetime import datetime
          date = datetime.now().strftime("%Y-%m-%d")

          lines = [f"🗞️ 科技资讯日报 · {date}", "", "⭐ **GitHub Trending**", ""]
          for r in repos[:7]:
              lang = f"`{r['language']}`" if r['language'] else ""
              lines.append(f"- **{r['name']}** {lang} ({r['stars']:,}⭐)")
              if r['description']:
                  lines.append(f"  > {r['description'][:60]}")

          lines += ["", "🔥 **HN 精选**", ""]
          for s in starred:
              lines.append(f"- **[{s['title']}]({s['url']})** ({s['points']}pts · {s['comments']}💬)")

          lines += ["", "📰 **HN Top 10**", ""]
          for i, s in enumerate(top[:10], 1):
              lines.append(f"{i}. [{s['title']}]({s['url']}) — {s['points']}pts")

          lines += ["", "---", "🤖 GitHub Actions · 每日 11:00 & 17:00 北京时间推送"]

          text = "\n".join(lines)

          app_id = "${{ secrets.FEISHU_APP_ID }}"
          app_secret = "${{ secrets.FEISHU_APP_SECRET }}"

          # 获取 token
          req = urllib.request.Request(
              "https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal",
              data=json.dumps({"app_id": app_id, "app_secret": app_secret}).encode(),
              headers={"Content-Type": "application/json"},
              method="POST"
          )
          with urllib.request.urlopen(req, timeout=10) as r:
              token_data = json.loads(r.read().decode())
          token = token_data.get("tenant_access_token", "")
          if not token:
              print("❌ 获取 token 失败:", token_data)
              exit(1)

          open_id = "${{ secrets.FEISHU_USER_OPEN_ID }}"
          msg = {
              "receive_id": open_id,
              "msg_type": "text",
              "content": json.dumps({"text": text})
          }
          req2 = urllib.request.Request(
              "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id",
              data=json.dumps(msg).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST"
          )
          with urllib.request.urlopen(req2, timeout=10) as r2:
              result = json.loads(r2.read().decode())
          code = result.get("code")
          if code == 0:
              print(f"✅ 飞书推送成功! GH {len(repos)} | HN {len(stories)}")
          else:
              print(f"❌ 飞书推送失败: {code} {result.get('msg','')}")
              exit(1)
          SCRIPT
